<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="main-container">


        <!-- LEFT SIDE (IMAGE) -->
        <div class="left">
             <img src="akan.jpg" alt="Akan culture">
        </div>
         <!-- RIGHT SIDE (CONTENT) -->
        <div class="right">
            <h1>Akan Name Generator</h1>
             <p>
        Akan names are derived from Ghanian culture. <br>
        Frequently in Ghana, children are given their first name as a 'day name' 
        which corresponds to the day in the week they were born. <br><br>
        <strong> Fill your details below to know your Akan name</strong>.<br><br><br>
      </p>

            <form id="form">
                <!-- NAME TEXT AREA -->
                 <textarea id="username" placeholder="Enter your name" autocomplete="on"></textarea>
                <input type="number" id="day" placeholder="Day (1-31)" required>
                <input type="number" id="month" placeholder="Month (1-12)" required>
                <input type="number" id="year" placeholder="Year" required>



<!-- GENDER -->
 <div class="gender">
                   <div class="gender">

    <label for="gender">Choose your gender:</label>
        <select id="gender" required> 
          <option value=""></option>
          <option value="female">Female</option>
          <option value="male">Male</option><br>
        </select>

</div>
 <button type="button"Onclick="getAkanName" id="send">Get akan name</button>
        <button type="reset" value="RESET" id="reset-form">RESET</button>
            </form>

            <h2 id="result"></h2>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
