<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <div class="main-container">

        <!-- LEFT SIDE (IMAGE) -->
        <div class="left">
            <img src="your-image.jpg" alt="Akan culture">
        </div>
         <!-- RIGHT SIDE (CONTENT) -->
        <div class="right">
            <h1>Akan Name Generator</h1>
            <p>Enter your birth details to find your Akan name</p>

            <form id="form">
                <input type="number" id="day" placeholder="Day (1-31)" required>
                <input type="number" id="month" placeholder="Month (1-12)" required>
                <input type="number" id="year" placeholder="Year" required>

    
</body>
</html>
