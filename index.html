<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="main-container">

        <!-- LEFT SIDE (IMAGE) -->
        <div class="left">
             <img src="akan.jpg" alt="Akan culture">
        </div>
         <!-- RIGHT SIDE (CONTENT) -->
        <div class="right">
            <h1>Akan Name Generator</h1>
            <p>Enter your birth details to find your Akan name</p>

            <form id="form">
                <!-- NAME TEXT AREA -->
                 <textarea id="username" placeholder="Enter your name"></textarea>
                <input type="number" id="day" placeholder="Day (1-31)" required>
                <input type="number" id="month" placeholder="Month (1-12)" required>
                <input type="number" id="year" placeholder="Year" required>



<!-- GENDER -->
 <div class="gender">
                   <div class="gender">

    <label class="tooltip">
        <input type="radio" name="gender" value="male">
        Male
        <span class="tooltip-text">Select if you are male</span>
    </label>

    <label class="tooltip">
        <input type="radio" name="gender" value="female">
        Female
        <span class="tooltip-text">Select if you are female</span>
    </label>

</div>
                   <button type="submit">Get Akan Name</button>
            </form>

            <h2 id="result"></h2>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
