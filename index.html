<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="styles.css">
  <title>HOME</title>
</head>
<body>
 <section>
  <div class="container">

    <!-- LEFT SIDE (IMAGE) -->
    <div class="left">
      <img src="akan.jpg" alt="Akan culture">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <h1>Akan Name Generator</h1>

      <p>
        Akan names are derived from Ghanaian culture. <br>
        Frequently in Ghana, children are given their first name as a 'day name' 
        which corresponds to the day in the week they were born. <br><br>
        <strong>Fill your details below to know your Akan name</strong>.
      </p>

      <!-- RESULT (NOW IN CORRECT POSITION) -->
      <div id="results"></div>

      <!-- FORM -->
      <form id="form-id">

        <input type="text" id="full-name" placeholder="Enter your name">

        <select id="gender">
          <option value="">Select gender</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
        </select>

        <input type="date" id="birth-date">

        <button type="submit">Get Akan Name</button>
        <button type="reset">Reset</button>

      </form>
    </div>

  </div>
</section>
 <script src="script.js"></script>
</body>
</html>
